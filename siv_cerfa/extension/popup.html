<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { width: 280px; background: #1a1a2e; color: #eee; }
    .header {
      background: #E55A00; padding: 12px 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .header h1 { font-size: 15px; color: #fff; }
    .header small { font-size: 10px; color: #ffd; display: block; margin-top: 2px; }
    .body { padding: 14px; }
    .status-box {
      background: #0f3460; border-radius: 6px; padding: 10px 12px;
      font-size: 12px; margin-bottom: 12px; min-height: 40px;
    }
    .btn {
      display: block; width: 100%; padding: 9px;
      background: #E55A00; color: #fff; border: none;
      border-radius: 5px; font-size: 13px; font-weight: bold;
      cursor: pointer; margin-bottom: 8px; text-align: center;
    }
    .btn:hover { background: #cc4f00; }
    .btn.secondary { background: #0f3460; font-size: 12px; font-weight: normal; }
    .btn.secondary:hover { background: #1a4a80; }
    .footer { padding: 8px 14px 10px; text-align: center; font-size: 10px; color: #666; }
    #status { color: #adf; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1>🖨 SIV → CERFA</h1>
      <small>Dreux Carte Grise v2.0</small>
    </div>
  </div>
  <div class="body">
    <div class="status-box">
      <span id="status">Naviguer sur l'écran de récapitulatif SIV pour activer la génération.</span>
    </div>
    <button class="btn" id="btnGenerer" disabled>Générer les CERFA</button>
    <button class="btn secondary" id="btnServer">🔌 Vérifier le serveur</button>
    <button class="btn secondary" id="btnList">📋 Derniers CERFA générés</button>
  </div>
  <div class="footer">Service local requis sur le port 5000</div>
  <script src="popup.js"></script>
</body>
</html>
